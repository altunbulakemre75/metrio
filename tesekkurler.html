<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teşekkürler — Metrio</title>
  <meta http-equiv="refresh" content="6;url=index.html">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --border: #1f2937;
      --accent: #10b981;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
    }
    .check-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: rgba(16, 185, 129, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #0a0f1e;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .btn:hover { opacity: 0.9; }
    .redirect {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Teşekkürler!</h1>
    <p>Başvurunuzu aldık. <strong>24 saat içinde</strong> size demo için dönüş yapacağız — genelde çok daha hızlı oluyor.</p>
    <a href="index.html" class="btn">Ana Sayfaya Dön</a>
    <p class="redirect">6 saniye içinde otomatik yönlendirileceksiniz.</p>
  </div>
</body>
</html>
